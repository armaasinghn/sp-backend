function startCamStream(){
  var constraints={video:{facingMode:'user',width:{ideal:1280},height:{ideal:960}}};
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    var msg=$('cam-msg-text');
    var spinner=$('cam-spinner');
    if(msg)msg.textContent='Camera not supported in this browser.';
    if(spinner)spinner.style.display='none';
    return;
  }
  navigator.mediaDevices.getUserMedia(constraints).then(function(stream){
    camStream=stream;
    var v=$('cam-video');
    if(!v)return;
    v.srcObject=stream;
    v.onloadedmetadata=function(){
      var msg=$('cam-msg');
      var cross=$('cam-crosshair');
      var btn=$('cam-btn');
      if(msg)msg.style.display='none';
      if(cross)cross.style.opacity='1';
      if(btn){btn.disabled=false;btn.style.opacity='1';}
    };
    v.play().catch(function(){});
  }).catch(function(err){
    var msg=$('cam-msg-text');
    var spinner=$('cam-spinner');
    var help=$('cam-help');
    var errMsg='Could not access camera.';
    if(err.name==='NotAllowedError'||err.name==='PermissionDeniedError'){
      errMsg='Camera permission denied.';
      if(help)help.style.display='block';
    } else if(err.name==='NotFoundError'){
      errMsg='No camera found on this device.';
    } else if(err.name==='NotReadableError'){
      errMsg='Camera is in use by another app.';
    }
    if(msg)msg.textContent=errMsg;
    if(spinner)spinner.style.display='none';
    var msg2=$('cam-msg');if(msg2)msg2.style.background='rgba(0,0,0,.75)';
  });
}

function doCapture(){
  var v=$('cam-video'),c=$('cam-canvas'),s=$('cam-snap-img'),flash=$('cam-flash');
  if(!v||!c)return;
  // Flash effect
  if(flash){flash.style.opacity='0.9';setTimeout(function(){flash.style.opacity='0';},120);}
  var MAX=400,vw=v.videoWidth||640,vh=v.videoHeight||480;
  var w=vw>MAX?MAX:vw,h=Math.round(vh*(w/vw));
  c.width=w;c.height=h;
  // Mirror to match what user saw (undo CSS scaleX)
  var ctx=c.getContext('2d');
  ctx.translate(c.width,0);ctx.scale(-1,1);
  ctx.drawImage(v,0,0,w,h);
  camSnap=c.toDataURL('image/jpeg',0.6);
  if(camStream)camStream.getTracks().forEach(function(t){t.stop();});
  v.style.display='none';
  if(s){s.src=camSnap;s.style.display='block';}
  var cross=$('cam-crosshair');if(cross)cross.style.display='none';
  var cb=$('cam-btns'),cu=$('cam-use');
  if(cb)cb.style.display='none';if(cu)cu.style.display='flex';
}

function doRetake(){
  camSnap='';
  var v=$('cam-video'),s=$('cam-snap-img');
  if(s)s.style.display='none';
  if(v){v.style.display='block';}
  var cross=$('cam-crosshair');if(cross)cross.style.display='flex';
  var cb=$('cam-btns'),cu=$('cam-use'),cm=$('cam-msg'),b=$('cam-btn'),sp=$('cam-spinner'),mt=$('cam-msg-text');
  if(cu)cu.style.display='none';if(cb)cb.style.display='flex';
  if(cm){cm.style.display='flex';cm.style.background='rgba(0,0,0,.6)';}
  if(sp)sp.style.display='block';
  if(mt)mt.textContent='Starting camera…';
  if(b){b.disabled=true;b.style.opacity='.5';}
  var help=$('cam-help');if(help)help.style.display='none';
  startCamStream();
}

function useCapture(){setPhotoPreview(camSnap);closeCameraModal();}

function closeCameraModal(){
  if(camStream)camStream.getTracks().forEach(function(t){t.stop();});
  camStream=null;
  var m=document.getElementById('cam-modal');if(m)m.remove();
}

async function saveUser(){
  var nameEl  = document.getElementById('um-name');
  var emailEl = document.getElementById('um-email');
  var roleEl  = document.getElementById('um-role');
  var deptEl  = document.getElementById('um-dept');
  var phoneEl = document.getElementById('um-phone');
  var desigEl = document.getElementById('um-desig');
  var passEl  = document.getElementById('um-pass');
  var errEl   = document.getElementById('um-err');
  var saveBtn = document.getElementById('um-save-btn');

  var name  = (nameEl  ? nameEl.value  : '').trim();
  var email = (emailEl ? emailEl.value : '').trim();
  var r     = roleEl   ? roleEl.value  : 'approver';
  var deptVal = deptEl ? deptEl.value  : '';
  var phone = (phoneEl ? phoneEl.value : '').trim();
  var desig = (desigEl ? desigEl.value : '').trim();
  var pass  = passEl   ? passEl.value  : '';

  function showErr(msg){ if(errEl){ errEl.textContent=msg; errEl.style.display=''; } }
  function hideErr(){ if(errEl) errEl.style.display='none'; }

  if(!name)  { showErr('Full name is required'); return; }
  if(!email) { showErr('Email is required'); return; }
  if(!editingUser && (!pass || pass.length < 6)){ showErr('Password must be at least 6 characters'); return; }
  hideErr();

  // Resolve dept: if value looks like a UUID use as department_id, else find by name
  var dept_id = null;
  if(deptVal) {
    var deptMatch = departments.find(function(d){ return d.id===deptVal || d.name===deptVal; });
    if(deptMatch) dept_id = deptMatch.id || null;
  }

  if(saveBtn){ saveBtn.disabled=true; saveBtn.textContent='Saving…'; }
  try {
    if(editingUser){
      await apiFetch('PATCH','/users/'+editingUser.id, {
        name, phone:phone||undefined, role:r,
        department_id:dept_id||undefined, designation:desig||undefined
      });
      toast(name+' updated successfully');
    } else {
      await apiFetch('POST','/users', {
        name, email, password:pass, phone:phone||undefined, role:r,
        department_id:dept_id||undefined, designation:desig||undefined
      });
      toast(name+' added — login: '+email+' / '+pass);
    }
    var modal = document.getElementById('user-modal');
    if(modal) modal.remove();
    adminPage();
  } catch(e){
    showErr(e.message||'Failed to save user');
    if(saveBtn){ saveBtn.disabled=false; saveBtn.textContent=(editingUser?'Save Changes':'Add User'); }
  }
}

}

function profilePhotoUpload(e){
  var file = e.target.files[0];
  if(!file) return;
  var form = new FormData();
  form.append('avatar', file);
  var opts = {method:'POST', headers:{}};
  if(authToken) opts.headers['Authorization'] = 'Bearer '+authToken;
  opts.body = form;
  fetch(API_BASE+'/users/me/avatar', opts)
    .then(function(res){ return res.json(); })
    .then(function(json){
      if(!json.success && !json.data) throw new Error(json.message||'Upload failed');
      var url = json.data.avatar_url;
      user.photo_url = url;
      var wrap = document.getElementById('profile-avatar-wrap');
      if(wrap) wrap.innerHTML='<img src="'+url+'" style="width:88px;height:88px;border-radius:50%;object-fit:cover;border:3px solid var(--border)"/>';
      var tav = document.querySelector('.topbar-av');
      if(tav){ tav.style.backgroundImage='url('+url+')'; tav.style.backgroundSize='cover'; tav.textContent=''; }
      toast('Profile photo updated');
    })
    .catch(function(err){ toast(err.message||'Failed to upload photo','err'); });
}

async function saveProfile(){
  var name  = (document.getElementById('pf-name') ||{}).value||'';
  var email = (document.getElementById('pf-email')||{}).value||'';
  var phone = (document.getElementById('pf-phone')||{}).value||'';
  if(!name.trim()){ toast('Name cannot be empty','err'); return; }
  try {
    var r = await apiFetch('PATCH','/users/me',{name:name.trim(), phone:phone.trim()});
    user.name  = r.data.name  || name.trim();
    user.phone = r.data.phone || phone.trim();
    user.email = email.trim();
    var sName = document.querySelector('.s-u-name');
    var sRole = document.querySelector('.s-u-role');
    if(sName) sName.textContent = user.name;
    if(sRole) sRole.textContent = user.role;
    var tav = document.querySelector('.topbar-av');
    if(tav && !user.photo_url) tav.textContent = user.name.charAt(0).toUpperCase();
    toast('Profile updated successfully');
  } catch(e){ toast(e.message||'Failed to update profile','err'); }

async function changePassword(){
  var cur  = (document.getElementById('pf-curpwd') ||{}).value||'';
  var nw   = (document.getElementById('pf-newpwd') ||{}).value||'';
  var conf = (document.getElementById('pf-confpwd')||{}).value||'';
  if(nw.length < 6){ toast('New password must be at least 6 characters','err'); return; }
  if(nw !== conf){ toast('Passwords do not match','err'); return; }
  try {
    await apiFetch('POST','/users/me/change-password',{currentPassword:cur, newPassword:nw});
    document.getElementById('pf-curpwd').value='';
    document.getElementById('pf-newpwd').value='';
    document.getElementById('pf-confpwd').value='';
    toast('Password changed successfully');
  } catch(e){ toast(e.message||'Failed to change password','err'); }
}

function regPhotoUpload(e){
  var file = e.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    var box = document.getElementById('rg-photo-box');
    if(box) box.innerHTML = '<img src="'+ev.target.result+'" />';
    window._rgPhoto = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function regDupCheck(){
  var email = (document.getElementById('rg-email')||{}).value||'';
  var phone = (document.getElementById('rg-phone')||{}).value||'';
  var idnum = (document.getElementById('rg-idnum')||{}).value||'';

  // Normalise phone for comparison
  var normPhone = function(p){ return p.replace(/[\s\-\+\(\)]/g,''); };

  // Check against existing visitors
  var dupEmail = email.length > 3 && visitors.some(function(v){
    return v.email && v.email.toLowerCase() === email.toLowerCase();
  });
  var dupPhone = phone.length > 5 && visitors.some(function(v){
    return v.phone && normPhone(v.phone) === normPhone(phone);
  });
  var dupId = idnum.length > 3 && visitors.some(function(v){
    return v.natid && v.natid.toLowerCase().replace(/\s/g,'') === idnum.toLowerCase().replace(/\s/g,'');
  });

  var warn = function(id, show){ var el=document.getElementById(id); if(el){ el.className='dup-warn'+(show?' show':''); } };
  warn('dup-email', dupEmail);
  warn('dup-phone', dupPhone);
  warn('dup-id',    dupId);

  return { dupEmail:dupEmail, dupPhone:dupPhone, dupId:dupId };
}

async function submitRegister(){
  var g = function(id){ return (document.getElementById(id)||{}).value||''; };
  var name   = g('rg-name').trim();
  var email  = g('rg-email').trim();
  var phone  = g('rg-phone').trim();
  var pwd    = g('rg-pwd');
  var pwd2   = g('rg-pwd2');
  var co     = g('rg-co').trim();
  var idtype = g('rg-idtype');
  var idnum  = g('rg-idnum').trim();
  var addr   = g('rg-addr').trim();
  var vnum   = g('rg-vnum').trim();
  var vtype  = g('rg-vtype');
  var moId   = g('rg-mo');
  var purp   = g('rg-purpose');
  var from   = g('rg-from');
  var until  = g('rg-until');
  var desc   = g('rg-desc').trim();
  var notes  = g('rg-notes').trim();

  var err = function(msg){ var el=document.getElementById('rg-err'); if(el){el.style.display='block';el.textContent=msg;} };
  document.getElementById('rg-err').style.display='none';

  if(!name){ err('Full name is required.'); return; }
  if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ err('A valid email address is required.'); return; }
  if(!phone){ err('Mobile number is required.'); return; }
  if(!pwd || pwd.length<6){ err('Password must be at least 6 characters.'); return; }
  if(pwd !== pwd2){ err('Passwords do not match.'); return; }
  if(!idtype || !idnum){ err('Government ID type and number are required.'); return; }
  var idValidRes = validateGovtId(idtype, idnum);
  if(!idValidRes.valid){ err(idValidRes.error); return; }
  // Warning: show but don't block
  if(idValidRes.warning){ toast(idValidRes.warning, 'warn'); }
  if(!moId){ err('Please select a Meeting Officer.'); return; }
  if(!purp){ err('Please select the purpose of your visit.'); return; }
  if(!from || !until){ err('Please select visit start and end date/time.'); return; }

  try {
    var r = await apiFetch('POST','/visitors/register',{
      name, email, phone, password:pwd,
      company:co||undefined, address:addr||undefined,
      govt_id_type:idtype||undefined,
      govt_id_number:(function(){ var r=GOVT_ID_RULES[idtype]; return r?r.sanitize(idnum):idnum; })()||undefined,
      vehicle_number:vnum||undefined, vehicle_type:vtype||undefined,
      purpose:purp, description:desc||undefined, valid_from:from, valid_until:until,
      host_user_id:moId,
    });
    var mo = staffUsers.find(function(u){ return u.id===moId; });
    showRegConfirmation(name, '(pending)', mo ? mo.name : 'the meeting officer', from);
    toast('Registration submitted! Check your email for login credentials.');
  } catch(e){ err(e.message||'Registration failed. Please try again.'); }
}

function fpStepDot(n, label, current){
  var cls = current > n ? 'done' : current === n ? 'active' : '';
  var icon = current > n
    ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>'
    : String(n);
  return '<div class="fp-step '+cls+'"><div class="fp-step-dot">'+icon+'</div><span>'+label+'</span></div>';
}

function fpTogglePwd(inputId, spanId){
  var inp = document.getElementById(inputId);
  var sp  = document.getElementById(spanId);
  if(!inp || !sp) return;
  inp.type = inp.type === 'password' ? 'text' : 'password';
  sp.textContent = inp.type === 'password' ? 'SHOW' : 'HIDE';
}

function fpGenOtp(){
  return String(Math.floor(100000 + Math.random() * 900000));
}

async function fpStep1Submit(){
  var email = (document.getElementById('fp-email-inp')||{}).value||'';
  email = email.trim().toLowerCase();
  var errEl = document.getElementById('fp-email-err');

  if(!email){
    if(errEl){ errEl.style.display='block'; errEl.textContent='Please enter your email address.'; }
    return;
  }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    if(errEl){ errEl.style.display='block'; errEl.textContent='Please enter a valid email address.'; }
    return;
  }

  try {
    var r = await apiFetch('POST','/auth/forgot-password',{email});
    _fpEmail = email;
    _fpOtp   = (r.data && r.data.otp) || ''; // dev mode returns OTP in response
    var ov = document.getElementById('fp-overlay');
    if(ov) ov.innerHTML = fpStepHTML(2);
    setTimeout(function(){ var el=document.getElementById('fp-otp-inp'); if(el) el.focus(); }, 100);
  } catch(e){
    if(errEl){ errEl.style.display='block'; errEl.textContent=e.message||'Failed to send OTP. Please try again.'; }
  }
}

function fpResendOtp(){
  _fpOtp = fpGenOtp();
  // Refresh step 2 with new OTP
  var ov = document.getElementById('fp-overlay');
  if(ov) ov.innerHTML = fpStepHTML(2);
  setTimeout(function(){ var el=document.getElementById('fp-otp-inp'); if(el) el.focus(); }, 100);
}

function fpStep2Submit(){
  var entered = ((document.getElementById('fp-otp-inp')||{}).value||'').trim();
  var errEl   = document.getElementById('fp-otp-err');

  if(!entered){
    if(errEl){ errEl.style.display='block'; errEl.textContent='Please enter the OTP.'; }
    return;
  }
  if(entered !== _fpOtp){
    if(errEl){ errEl.style.display='block'; errEl.textContent='Incorrect OTP. Please check and try again.'; }
    // Shake animation
    var inp = document.getElementById('fp-otp-inp');
    if(inp){ inp.style.borderColor='var(--red)'; setTimeout(function(){ inp.style.borderColor=''; },1500); }
    return;
  }

  // Move to step 3
  var ov = document.getElementById('fp-overlay');
  if(ov) ov.innerHTML = fpStepHTML(3);
  setTimeout(function(){ var el=document.getElementById('fp-pw1'); if(el) el.focus(); }, 100);
}

async function fpStep3Submit(){
  var pw1   = (document.getElementById('fp-pw1')||{}).value||'';
  var pw2   = (document.getElementById('fp-pw2')||{}).value||'';
  var errEl = document.getElementById('fp-pw-err');

  if(!pw1){
    if(errEl){ errEl.style.display='block'; errEl.textContent='Please enter a new password.'; }
    return;
  }
  if(pw1.length < 6){
    if(errEl){ errEl.style.display='block'; errEl.textContent='Password must be at least 6 characters.'; }
    return;
  }
  if(pw1 !== pw2){
    if(errEl){ errEl.style.display='block'; errEl.textContent='Passwords do not match.'; }
    return;
  }

  try {
    await apiFetch('POST','/auth/reset-password',{email:_fpEmail, otp:_fpOtp, newPassword:pw1});
    var ov = document.getElementById('fp-overlay');
    if(ov) ov.innerHTML = fpStepHTML(4);
    _fpOtp = '';
  } catch(e){
    if(errEl){ errEl.style.display='block'; errEl.textContent=e.message||'Failed to reset password. Please try again.'; }
  }
}

}

function closeForgotUidModal(){
  var ov = document.getElementById('fuid-overlay');
  if(ov) ov.remove();
}

function maskEmail(email){
  var parts = email.split('@');
  if(parts.length < 2) return email;
  var local  = parts[0];
  var domain = parts[1];
  // Show first 2 chars + stars + last char
  var masked = local.length <= 3
    ? local[0] + '***'
    : local.substring(0,2) + '*'.repeat(Math.min(local.length-3, 5)) + local[local.length-1];
  return masked + '@' + domain;
}

  var tb = document.getElementById('fuid-tab-phone');
  var tn = document.getElementById('fuid-tab-name');
  if(!pf||!nf||!tb||!tn) return;
  if(tab==='phone'){

    tn.style.cssText='flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--white);font-size:12.5px;font-weight:500;color:var(--muted);cursor:pointer;font-family:var(--font-body);transition:all .2s';

async function fuidSubmit(){
  var errEl = document.getElementById('fuid-err');
  var payload = {};

  if(_fuidTab === 'phone'){
    var phone = (document.getElementById('fuid-inp')||{}).value||'';
    phone = phone.trim();
    if(!phone){ if(errEl){errEl.style.display='block';errEl.textContent='Please enter your mobile number.';} return; }
    payload.phone = phone;
  } else {
    var name = (document.getElementById('fuid-name-inp')||{}).value||'';
    name = name.trim();
    if(!name){ if(errEl){errEl.style.display='block';errEl.textContent='Please enter your full name.';} return; }
    if(name.length<3){ if(errEl){errEl.style.display='block';errEl.textContent='Please enter at least 3 characters.';} return; }
    payload.name = name;
  }

  try {
    var r = await apiFetch('POST','/auth/lookup-user-id',payload);
    if(!r.data.found){
      if(errEl){errEl.style.display='block';errEl.textContent='No account found. Please check your details or contact your administrator.';}
      return;
    }
    var found = {
      email: r.data.maskedEmail,
      name: r.data.name,
      role: r.data.role,
      initial: (r.data.name||'U').charAt(0).toUpperCase(),
      color: 'var(--acc)',
    };
    var ov = document.getElementById('fuid-overlay');
    if(ov) ov.innerHTML = fuidStepHTML(2, found);
  } catch(e){
    if(errEl){errEl.style.display='block';errEl.textContent=e.message||'Failed to look up account.';}
  }
}

function fuidReveal(email){
  var disp = document.getElementById('fuid-display');
  var btn  = document.getElementById('fuid-reveal-btn');
  if(disp){ disp.textContent = email; }
  if(btn){ btn.style.display = 'none'; }
}

function fuidFillAndClose(email){
  closeForgotUidModal();
  var inp = document.getElementById('li-email');
  if(inp){
    inp.value = email;
    inp.focus();
    // Highlight the field briefly
    inp.style.background = 'rgba(6,182,212,0.12)';
    inp.style.borderColor = 'rgba(6,182,212,0.6)';
    setTimeout(function(){ inp.style.background=''; inp.style.borderColor=''; }, 1800);
  }
}

/* ─── BOOT ───────────────────────────────────── */
async function init(){
  if(authToken){
    try {
      var r = await apiFetch('GET','/users/me');
      var u = r.data;
      role = u.role;
      user = {id:u.id, name:u.name, role:u.role, email:u.email,
              phone:u.phone||'', photo_url:u.avatar_url||'',
              color:u.color||'#0891b2', initial:u.initial||(u.name||'U').charAt(0).toUpperCase(),
              department:u.department||''};
      // Load staff users for non-visitors
      if(role !== 'visitor'){
        try {
          var su = await apiFetch('GET','/users');
          staffUsers = (su.data||[]).map(mapUser);
        } catch(e){}
      }
      // Load gates (all roles may request a pass)
      try {
        var gr = await apiFetch('GET','/gates');
        gates = gr.data || [];
      } catch(e){}
      if(!gates.length){
        gates = [{id:1,name:'Main Gate'},{id:2,name:'Gate 2'},{id:3,name:'Gate 3'},{id:4,name:'Visitor Gate'}];
      }
      page = defPage[role] || 'dashboard';
      render();
      return;
    } catch(e){
      authToken = null; refreshTokenStr = null;
      localStorage.removeItem('sp_token'); localStorage.removeItem('sp_refresh');
    }
  }
  render(); // show login
}

init();
